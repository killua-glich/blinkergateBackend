spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/blinkergate}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:blinker}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:blinkerpass}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:blinkergate-super-secret-jwt-key-change-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

server.port=8080
